<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link href="./output.css" rel="stylesheet"> -->
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>

    <style>
        .shape {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: #FFC529;
            z-index: -1;

            clip-path: path("M 300 0 C 120 0, 80 150, 180 220 C 260 280, 80 380, 200 480 C 320 580, 400 650, 500 700 L 100% 700 L 100% 0Z");
        }
    </style>
</head>

<body>
    <!-- Header -->
    <Header class="pt-10">

        <div class="flex">
            <!-- Logo --> 
            <div class="ml-20 p-2 pl-20 font-bold">Fast Food</div>
            <div class="flex flex-1 justify-end items-center gap-20">
                <!-- Navigation -->
                <div class="">
                    <nav>
                        <ul class="flex gap-4 font-bold ">
                            <li><a href="#">Home</a></li>
                            <li><a href="#">About</a></li>
                            <li><a href="#">Menu</a></li>
                            <li><a href="#">Testimonials</a></li>
                            <li><a href="#">Blog</a></li>
                            <li><a href="#">Contact us</a></li>
                        </ul>
                    </nav>
                </div>
                <!-- icons -->
                <div class="mr-20 flex gap-2">
                    <button>search</button>
                    <button>shop</button>
                </div>
            </div>
        </div>

    </Header>
    <!-- end Header -->



    <!-- main -->

    <section class="flex items-center gap-20 ">
        <svg class="absolute  h-[100%] w-full -z-10 rounded-bl-[150px] md:rounded-bl-[300px] md:w-1/2 top-0 right-0"
            viewBox="0 0 700 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="
    M 110,0
    C 20,0  02,60  100,100
    C 180,140  195,140  160,185
C 90,245  205,300  260,300
    L 700,300
    L 700,0
    Z
  " fill="#FFC529" />
        </svg>

        <div class="pl-20 ml-20   mt-5 pt-40">
            <span class="text-orange-500 font-semibold border-l-4 border-orange-500 pl-3"> Fast Food Restaurant</span>
            <h1 class="text-2xl md:text-3xl font-bold leading-tight mt-2">
                We Serve
            </h1>
            <h2 class="text-5xl md:text-7xl font-bold text-gray-800 mt-4">
                Delicious
                <span class="text-orange-400">Food</span>
            </h2>
            <p class="text-gray-600 mt-6">
                Keep it easy with those simple but delicious recipes from make-ahead lunches and midweek meals to
                fuss-free sides.
            </p>
            <button
                class="bg-[#FFC529] mt-6 hover:bg-black hover:text-white transition-all duration-300 px-8 py-3 rounded-full font-bold shadow-lg">
                Get started
            </button>
        </div>


        <div class="w-full md:w-1/2 relative flex justify-center items-center min-h-[450px]">

            <!-- Image principale (grande, centrée) -->
            <div
                class="relative z-10 w-56 h-56 md:w-72 md:h-72 rounded-full border-[8px] border-white shadow-2xl overflow-hidden">
                <img src="./assets/images/anh-nguyen-kcA-c3f_3FE-unsplash.jpg" alt="Main Dish"
                    class="w-full h-full object-cover">
            </div>

            <!-- Petite image haut-droite -->
            <div class="relative pt-80 mt-10 mr-20 translate-y-12">
                <div
                    class="absolute -bottom-13 -right-1 w-24 h-24 md:w-40 md:h-40 rounded-full border-4 border-white shadow-xl overflow-hidden z-20">
                    <img src="./assets/images/sina-piryae-bBzjWthTqb8-unsplash.jpg" class="w-full h-full object-cover">
                </div>
                <!-- Petite image bas-gauche -->
                <div
                    class="absolute bottom-10 left-10  w-20 h-20 md:w-40 md:h-40 rounded-full border-4 border-white shadow-xl overflow-hidden z-20">
                    <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&q=80&w=400"
                        class="w-full h-full object-cover">
                </div>
                <!-- Petite image bas-droite -->
                <div
                    class="absolute -bottom-14 right-60  w-20 h-20 md:w-36 md:h-36 rounded-full border-4 border-white shadow-xl overflow-hidden z-20">
                    <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&q=80&w=400"
                        class="w-full h-full object-cover">
                </div>
            </div>

        </div>

    </section>

    <!-- end main -->


    <!-- footer -->
    <!-- end footer -->

</body>

</html>
